<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <div class="main">
        <nav>
            <div class="logo">
                <h3 class="brand-name">Clean<span class="highlight">Pro</span></h3>
                <i class="ri-bubble-chart-line"></i>
            </div>
            <div class="menu">
                <h5>
                    <span>Services</span>
                    <i class="ri-arrow-drop-down-fill"></i>
                </h5>
                <h5>Help</h5>
                <h5>
                    <span>Pricing</span>
                    <i class="ri-arrow-drop-down-fill"></i>
                </h5>
                <h5>Recyclers</h5>
            </div>
            <div class="application-link">
                <h5>Get the App</h5>
                <i class="ri-google-play-fill"></i>
            </div>
        </nav>
        <section class="brand-moto">
            <div class="moto-left adv">
                <div class="moto-img-left"></div>
                <p>Though stain? We'll make your cloths flawless!</p>
                <div class="moto-img-right"></div>
            </div>
            <div class="moto-right adv" >
                <div class="moto-img-left"></div>
                <p>We'll handle Any stain- Guaranted Removal</p>
                <div class="moto-img-right"></div>
            </div>
        </section>
        <section class="brand-adv">
            <div class="level-text">
                <div class="rating">
                    <img class="star" width="25px" src="./yellow-star.png" alt="">
                    <img class="star" width="25px" src="./yellow-star.png" alt="">
                    <img class="star" width="25px" src="./yellow-star.png" alt="">
                    <img class="star" width="25px" src="./yellow-star.png" alt="">
                    <img class="star" width="25px" src="./yellow-star.png" alt="">
                </div>
                <div class="main-context">
                    <h1>The New <br>
                        Level of Care <br>
                        for Your <br>
                        Wardrobe</h1>
                </div>
            </div>
            <div class="work-fig">
                <img src="./shirt-stack.png" alt="" width="140px">
                <h2>2.7K +</h2>
                <p>Just Trust Us- <br> We'll Take Care of It</p>
            </div>
        </section>
        <footer>
            <div class="bussiness-digits">
                <div class="photo-row">
                    <img src="https://images.unsplash.com/photo-1623366302587-b38b1ddaefd9?q=80&w=1025&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="" class="img-1">
                    <img src="https://images.unsplash.com/photo-1623366302587-b38b1ddaefd9?q=80&w=1025&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="" class="img-2">
                    <img src="https://images.unsplash.com/photo-1623366302587-b38b1ddaefd9?q=80&w=1025&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="" class="img-3">
                    <img src="https://images.unsplash.com/photo-1623366302587-b38b1ddaefd9?q=80&w=1025&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="" class="img-4">
                    <img src="https://images.unsplash.com/photo-1623366302587-b38b1ddaefd9?q=80&w=1025&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D" alt="" class="img-5">
                </div>
                <h2>5K <span>+</span></h2>
            </div>
            <div class="book-appointment">
                <h4>Reserve Service</h4>
                <i class="ri-arrow-right-up-long-line"></i>
            </div>
        </footer>
    </div>
</body>
</html>
